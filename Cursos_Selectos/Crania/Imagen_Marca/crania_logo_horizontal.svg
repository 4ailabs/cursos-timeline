<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crania — Logo horizontal">

  <!-- Isotipo a la izquierda -->
  <g transform="translate(140, 140)">
    <circle r="115" fill="none" stroke="#B5604A" stroke-width="0.6" opacity="0.3"/>

    <g fill="none" stroke="#B5604A" stroke-width="1.5">
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z"/>
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z" transform="rotate(60)"/>
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z" transform="rotate(120)"/>
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z" transform="rotate(180)"/>
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z" transform="rotate(240)"/>
      <path d="M 0,0 C -30,-30 -30,-80 0,-110 C 30,-80 30,-30 0,0 Z" transform="rotate(300)"/>
    </g>

    <g fill="none" stroke="#B5604A" stroke-width="1.3" opacity="0.7">
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(30)"/>
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(90)"/>
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(150)"/>
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(210)"/>
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(270)"/>
      <path d="M 0,0 C -18,-18 -18,-50 0,-70 C 18,-50 18,-18 0,0 Z" transform="rotate(330)"/>
    </g>

    <g stroke="#E8A857" stroke-width="0.6" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-110"/>
      <line x1="0" y1="0" x2="0" y2="-110" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-110" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-110" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-110" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-110" transform="rotate(300)"/>
    </g>

    <circle r="20" fill="none" stroke="#B5604A" stroke-width="1.1"/>
    <circle r="12" fill="none" stroke="#E8A857" stroke-width="0.8"/>
    <circle r="4" fill="#E8A857"/>
  </g>

  <!-- Divisor vertical sutil -->
  <line x1="290" y1="80" x2="290" y2="200" stroke="#E8A857" stroke-width="0.6" opacity="0.5"/>

  <!-- Wordmark a la derecha -->
  <g transform="translate(320, 140)">
    <text font-family="'Cormorant Garamond', Georgia, serif"
          font-size="64" font-weight="400" font-style="italic"
          letter-spacing="3" fill="#2A1F1A"
          x="0" y="0">Crania</text>
    <text font-family="'Inter', sans-serif"
          font-size="11" font-weight="400" letter-spacing="5"
          fill="#B5604A"
          x="3" y="26">PRÁCTICA CRANEOFASCIAL</text>
    <text font-family="'Inter', sans-serif"
          font-size="8" font-weight="300" letter-spacing="3"
          fill="#888580"
          x="3" y="48">INSTITUTO CENTROBIOENERGETICA</text>
  </g>
</svg>
