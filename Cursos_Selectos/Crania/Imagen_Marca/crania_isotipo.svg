<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crania — Isotipo">
  <!-- ISOTIPO — Solo el rosetón geométrico, sin wordmark -->

  <g transform="translate(150, 150)">

    <!-- Círculo exterior contenedor -->
    <circle r="135" fill="none" stroke="#B5604A" stroke-width="0.6" opacity="0.3"/>

    <!-- CAPA EXTERIOR: 6 pétalos grandes -->
    <g fill="none" stroke="#B5604A" stroke-width="1.6">
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z"/>
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z" transform="rotate(60)"/>
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z" transform="rotate(120)"/>
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z" transform="rotate(180)"/>
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z" transform="rotate(240)"/>
      <path d="M 0,0 C -35,-35 -35,-95 0,-130 C 35,-95 35,-35 0,0 Z" transform="rotate(300)"/>
    </g>

    <!-- CAPA INTERIOR: 6 pétalos rotados 30° -->
    <g fill="none" stroke="#B5604A" stroke-width="1.4" opacity="0.7">
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(30)"/>
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(90)"/>
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(150)"/>
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(210)"/>
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(270)"/>
      <path d="M 0,0 C -22,-22 -22,-60 0,-82 C 22,-60 22,-22 0,0 Z" transform="rotate(330)"/>
    </g>

    <!-- 6 líneas radiales doradas -->
    <g stroke="#E8A857" stroke-width="0.6" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-130"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(300)"/>
    </g>

    <!-- Núcleo central -->
    <circle r="24" fill="none" stroke="#B5604A" stroke-width="1.2"/>
    <circle r="14" fill="none" stroke="#E8A857" stroke-width="0.8"/>
    <circle r="5" fill="#E8A857"/>

  </g>
</svg>
