<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crania favicon">
  <!-- Versión simplificada para favicon — trazo más grueso, sin círculo exterior -->
  <g transform="translate(32, 32)">

    <g fill="none" stroke="#B5604A" stroke-width="1.8">
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z"/>
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z" transform="rotate(60)"/>
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z" transform="rotate(120)"/>
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z" transform="rotate(180)"/>
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z" transform="rotate(240)"/>
      <path d="M 0,0 C -7,-7 -7,-19 0,-26 C 7,-19 7,-7 0,0 Z" transform="rotate(300)"/>
    </g>

    <g fill="none" stroke="#B5604A" stroke-width="1.5" opacity="0.75">
      <path d="M 0,0 C -4.5,-4.5 -4.5,-12 0,-16 C 4.5,-12 4.5,-4.5 0,0 Z" transform="rotate(30)"/>
      <path d="M 0,0 C -4.5,-4.5 -4.5,-12 0,-16 C 4.5,-12 4.5,-4.5 0,0 Z" transform="rotate(90)"/>
