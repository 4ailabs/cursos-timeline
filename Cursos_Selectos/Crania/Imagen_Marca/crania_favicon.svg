      <path d="M 0,0 C -4.5,-4.5 -4.5,-12 0,-16 C 4.5,-12 4.5,-4.5 0,0 Z" transform="rotate(210)"/>
      <path d="M 0,0 C -4.5,-4.5 -4.5,-12 0,-16 C 4.5,-12 4.5,-4.5 0,0 Z" transform="rotate(270)"/>
      <path d="M 0,0 C -4.5,-4.5 -4.5,-12 0,-16 C 4.5,-12 4.5,-4.5 0,0 Z" transform="rotate(330)"/>
    </g>

    <circle r="2" fill="#E8A857"/>
