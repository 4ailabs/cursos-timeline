<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Instituto Centrobioenergetica</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242836;
  --border: #2e3345;
  --text: #e4e6f0;
  --text2: #8b90a5;
  --accent: #7B68EE;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --orange: #fb923c;
  --purple: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { cursor:pointer; font-family:inherit; }
input, select, textarea { font-family:inherit; }

/* TOP NAV */
.topnav { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.topnav-left { display:flex; align-items:center; gap:16px; }
.logo { font-size:18px; font-weight:700; }
.logo span { color:var(--accent); }
.tabs { display:flex; gap:4px; background:var(--bg3); border-radius:8px; padding:3px; }
.tab { padding:8px 20px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:14px; font-weight:500; transition:all .2s; }
.tab.active { background:var(--accent); color:#fff; }
.tab:hover:not(.active) { color:var(--text); background:rgba(255,255,255,.05); }
.btn-manage { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:13px; display:flex; align-items:center; gap:6px; transition:all .2s; }
.btn-manage:hover { border-color:var(--accent); color:var(--accent); }

/* TODAY VIEW */
.today-view { max-width:900px; margin:0 auto; padding:24px; }
.date-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
.date-nav h2 { font-size:22px; font-weight:600; min-width:280px; text-align:center; }
.date-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.date-btn:hover { border-color:var(--accent); color:var(--accent); }
.today-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-size:12px; font-weight:600; transition:all .2s; }
.today-btn:hover { background:var(--accent); color:#fff; }
.summary-bar { display:flex; gap:16px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
.summary-item { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:5px; }
.summary-dot { width:8px; height:8px; border-radius:50%; }

/* COURSE SECTION */
.course-section { background:var(--bg2); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; }
.course-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:background .2s; }
.course-header:hover { background:rgba(255,255,255,.02); }
.course-header-left { display:flex; align-items:center; gap:12px; }
.course-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.course-name { font-weight:600; font-size:15px; }
.course-phase { font-size:12px; padding:4px 10px; border-radius:20px; background:rgba(255,255,255,.06); color:var(--text2); }
.course-countdown { font-size:12px; color:var(--text2); }
.collapse-icon { color:var(--text2); transition:transform .2s; font-size:12px; }
.course-section.open .collapse-icon { transform:rotate(180deg); }
.course-body { padding:0 20px 16px; display:none; }
.course-section.open .course-body { display:block; }

/* TASKS */
.task-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; transition:background .2s; }
.task-item:hover { background:rgba(255,255,255,.03); }
.task-status { width:28px; height:28px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:all .2s; flex-shrink:0; }
.task-status.not_started { border-color:var(--text2); }
.task-status.not_started:hover { border-color:var(--yellow); }
.task-status.in_progress { border-color:var(--yellow); background:rgba(251,191,36,.15); color:var(--yellow); }
.task-status.done { border-color:var(--green); background:rgba(74,222,128,.15); color:var(--green); }
.task-info { flex:1; }
.task-name { font-size:14px; }
.task-name.done { text-decoration:line-through; color:var(--text2); }
.task-time { font-size:12px; color:var(--text2); margin-top:2px; }
.empty-day { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-day .emoji { font-size:40px; margin-bottom:12px; }

/* GANTT VIEW */
.gantt-view { padding:24px; overflow-x:auto; }
.gantt-controls { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.zoom-btns { display:flex; gap:4px; background:var(--bg3); border-radius:8px; padding:3px; }
.zoom-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; transition:all .2s; }
.zoom-btn.active { background:var(--accent); color:#fff; }
.gantt-container { position:relative; min-height:200px; }
.gantt-header { display:flex; border-bottom:1px solid var(--border); position:sticky; top:60px; background:var(--bg); z-index:10; }
.gantt-label-col { width:200px; flex-shrink:0; padding:10px 16px; font-size:13px; font-weight:600; color:var(--text2); border-right:1px solid var(--border); }
.gantt-timeline { display:flex; flex:1; }
.gantt-month { text-align:center; font-size:12px; color:var(--text2); padding:8px 0; border-right:1px solid rgba(255,255,255,.05); font-weight:500; }
.gantt-row { display:flex; border-bottom:1px solid rgba(255,255,255,.03); min-height:48px; align-items:center; }
.gantt-row-label { width:200px; flex-shrink:0; padding:8px 16px; font-size:13px; display:flex; align-items:center; gap:8px; border-right:1px solid var(--border); }
.gantt-row-timeline { flex:1; position:relative; height:48px; }
.gantt-bar { position:absolute; height:24px; top:12px; border-radius:6px; opacity:.8; transition:opacity .2s; cursor:pointer; }
.gantt-bar:hover { opacity:1; }
.gantt-bar-label { font-size:10px; color:#fff; padding:0 6px; line-height:24px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gantt-milestone { position:absolute; top:10px; width:16px; height:16px; transform:rotate(45deg) translateX(-50%); border-radius:2px; cursor:pointer; z-index:5; transition:transform .2s; }
.gantt-milestone:hover { transform:rotate(45deg) translateX(-50%) scale(1.3); }
.gantt-today-line { position:absolute; top:0; bottom:0; width:2px; background:var(--red); z-index:8; pointer-events:none; }
.gantt-today-label { position:absolute; top:-20px; font-size:10px; color:var(--red); font-weight:600; transform:translateX(-50%); white-space:nowrap; }
.tooltip { position:fixed; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:13px; z-index:200; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.4); max-width:250px; display:none; }
.tooltip .tt-title { font-weight:600; margin-bottom:4px; }
.tooltip .tt-date { color:var(--text2); font-size:12px; }
.tooltip .tt-status { font-size:12px; margin-top:4px; }

/* EDITOR PANEL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:150; display:none; }
.overlay.open { display:block; }
.editor { position:fixed; top:0; right:-480px; width:460px; height:100vh; background:var(--bg2); border-left:1px solid var(--border); z-index:200; transition:right .3s; overflow-y:auto; padding:24px; }
.editor.open { right:0; }
.editor h3 { font-size:18px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
.editor-close { background:none; border:none; color:var(--text2); font-size:22px; cursor:pointer; }
.editor-close:hover { color:var(--text); }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:14px; outline:none; transition:border .2s; }
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.color-picker { display:flex; gap:8px; flex-wrap:wrap; }
.color-swatch { width:32px; height:32px; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:all .2s; }
.color-swatch.selected { border-color:#fff; transform:scale(1.1); }
.btn-primary { padding:10px 20px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:14px; font-weight:600; width:100%; transition:opacity .2s; }
.btn-primary:hover { opacity:.85; }
.btn-danger { padding:8px 16px; border-radius:8px; border:1px solid var(--red); background:transparent; color:var(--red); font-size:13px; transition:all .2s; }
.btn-danger:hover { background:var(--red); color:#fff; }
.btn-secondary { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:13px; transition:all .2s; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.editor-actions { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
.course-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all .2s; }
.course-card:hover { border-color:var(--accent); }
.course-card-header { display:flex; align-items:center; gap:10px; }
.course-card-actions { display:flex; gap:6px; margin-top:10px; }
.item-row { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg); border-radius:6px; margin-bottom:6px; font-size:13px; }
.item-row .del-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:16px; margin-left:auto; }
.item-row .del-btn:hover { color:var(--red); }
.sub-section { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.sub-section h4 { font-size:14px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.add-btn { background:none; border:1px dashed var(--border); border-radius:6px; padding:8px; width:100%; color:var(--text2); font-size:13px; cursor:pointer; transition:all .2s; margin-top:8px; }
.add-btn:hover { border-color:var(--accent); color:var(--accent); }
.task-notes { font-size:12px; color:var(--text2); margin-top:6px; padding:8px 12px; background:var(--bg); border-radius:6px; white-space:pre-wrap; line-height:1.5; display:none; }
.task-item.show-notes .task-notes { display:block; }
.task-name { cursor:pointer; }
</style>
</head>

      { id:'tm05', name:'YouTube Live #1: Lo Que Tu Mascota Quiere Decirte', phaseId:'pm2', date:'2026-03-19', time:'20:15', status:'not_started', notes:"YouTube Live #1: \"Lo Que Tu Mascota Quiere Decirte\"\n8:15 PM\n\nLink de inscripci\u00f3n en: descripci\u00f3n del video + comentario fijado.\n\nRECORDAR: dar correlaciones generales de los 5 conflictos, NO personalizar. Ense\u00f1ar solo Rescue Remedy como herramienta gratis." },
      { id:'tm06', name:'Publicar clip 60 seg del live + link inscripcion', phaseId:'pm2', date:'2026-03-21', time:null, status:'not_started', notes:"Cortar el mejor momento del live (60 seg). Agregar texto:\n\n\"Esto fue solo una parte. El taller completo es el viernes 27 de marzo.\n\nLo Que Tu Mascota Quiere Decirte\n2 m\u00f3dulos: 27 marzo + 10 abril, 3 a 7pm\nFlores de Bach, imanes y el v\u00ednculo entre t\u00fa y tu animal.\n\n[link de inscripci\u00f3n]\"" },
      { id:'tm07', name:'Post "Lo que te llevas" + link inscripcion', phaseId:'pm2', date:'2026-03-24', time:null, status:'not_started', notes:"Texto:\n\"Lo que te llevas del taller Lo Que Tu Mascota Quiere Decirte:\n\n\u2192 Tabla de 10 conflictos que tu mascota absorbe de ti\n\u2192 7 Flores de Bach esenciales para animales\n\u2192 5 f\u00f3rmulas predise\u00f1adas listas para usar\n\u2192 5 pares biomag\u00e9ticos adaptados a mascotas\n\u2192 Protocolo de 5 pasos para usar en casa\n\u2192 Hoja resumen para pegar en tu refri\n\u2192 Rutina diaria y semanal para cuidar a tu animal\n\nNo necesitas ser terapeuta. Solo necesitas tener mascota.\n\n2 viernes: 27 de marzo + 10 de abril, 3-7pm\n[link de inscripci\u00f3n]\"" },

// ==================== STATE ====================
let data = loadData();
let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let currentView = 'today';
let ganttZoom = 'month';

function loadData() {
  const saved = localStorage.getItem('instituto-timeline');
  if (saved) { try { return JSON.parse(saved); } catch(e) {} }
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveData() { localStorage.setItem('instituto-timeline', JSON.stringify(data)); }
function uid() { return 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ==================== DATE HELPERS ====================
const DAYS = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function fmt(d) { return `${DAYS[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]}, ${d.getFullYear()}`; }
function iso(d) { return d.toISOString().split('T')[0]; }
function parseD(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function diffDays(a,b) { return Math.round((b-a)/(86400000)); }
function isToday(d) { const t=new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); }
function sameDay(a,b) { return iso(a)===iso(b); }

// ==================== VIEW SWITCHING ====================
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view===v));
  document.getElementById('today-view').style.display = v==='today' ? 'block' : 'none';
  document.getElementById('gantt-view').style.display = v==='gantt' ? 'block' : 'none';
  if (v==='today') renderToday();
  else renderGantt();
}

// ==================== TODAY VIEW ====================
function renderToday() {
  const el = document.getElementById('today-view');
  const dateStr = iso(currentDate);
  const isTodayDate = isToday(currentDate);

  // Find tasks for this date
  let allTasks = [];
  data.courses.forEach(c => {
    const tasks = c.tasks.filter(t => t.date === dateStr);
    if (tasks.length) allTasks.push({ course:c, tasks });
  });

  const totalTasks = allTasks.reduce((s,g) => s+g.tasks.length, 0);
  const done = allTasks.reduce((s,g) => s+g.tasks.filter(t=>t.status==='done').length, 0);
  const inProg = allTasks.reduce((s,g) => s+g.tasks.filter(t=>t.status==='in_progress').length, 0);
  const pending = totalTasks - done - inProg;

  let html = `
    <div class="date-nav">
      <button class="date-btn" onclick="navDate(-1)">&#8249;</button>
      <h2>${fmt(currentDate)}</h2>
      <button class="date-btn" onclick="navDate(1)">&#8250;</button>
      ${!isTodayDate ? '<button class="today-btn" onclick="goToday()">Hoy</button>' : ''}
    </div>`;

  if (totalTasks > 0) {
    html += `<div class="summary-bar">
      <div class="summary-item"><div class="summary-dot" style="background:var(--text2)"></div>${pending} pendiente${pending!==1?'s':''}</div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--yellow)"></div>${inProg} en progreso</div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--green)"></div>${done} completada${done!==1?'s':''}</div>
    </div>`;
  }

  if (allTasks.length === 0) {
    html += `<div class="empty-day"><div class="emoji">🌿</div><p>Sin tareas programadas</p></div>`;
  } else {
    allTasks.forEach(g => {
      const phase = g.course.phases.find(p => dateStr >= p.startDate && dateStr <= p.endDate);
      const phaseName = phase ? phase.name : '';
      let phaseDay = '', phaseDays = '';
      if (phase) {
        const s = parseD(phase.startDate);
        const e = parseD(phase.endDate);
        phaseDay = diffDays(s, currentDate) + 1;
        phaseDays = diffDays(s, e) + 1;
      }
      // Next milestone
      const nextM = g.course.milestones
        .filter(m => m.date >= dateStr)
        .sort((a,b) => a.date.localeCompare(b.date))[0];
      const countdown = nextM ? `⏳ Faltan ${diffDays(currentDate, parseD(nextM.date))} dias para ${nextM.name}` : '';

      html += `<div class="course-section open">
        <div class="course-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="course-header-left">
            <div class="course-dot" style="background:${g.course.color}"></div>
            <span class="course-name">${g.course.name}</span>
            ${phaseName ? `<span class="course-phase">${phaseName} — Dia ${phaseDay} de ${phaseDays}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            ${countdown ? `<span class="course-countdown">${countdown}</span>` : ''}
            <span class="collapse-icon">▼</span>
          </div>
        </div>
        <div class="course-body">
          ${g.tasks.map(t => `
            <div class="task-item" id="task-${t.id}">
              <div class="task-status ${t.status}" onclick="cycleStatus('${g.course.id}','${t.id}')" title="Clic para cambiar estado">
                ${t.status==='not_started' ? '' : t.status==='in_progress' ? '🔄' : '✓'}
              </div>
              <div class="task-info">
                <div class="task-name ${t.status==='done'?'done':''}" onclick="toggleNotes('task-${t.id}')">${t.name}</div>
                ${t.time ? `<div class="task-time">${t.time}</div>` : ''}
                ${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function navDate(dir) { currentDate.setDate(currentDate.getDate()+dir); renderToday(); }
function goToday() { currentDate = new Date(); currentDate.setHours(0,0,0,0); renderToday(); }

function cycleStatus(courseId, taskId) {
  const course = data.courses.find(c=>c.id===courseId);
  const task = course.tasks.find(t=>t.id===taskId);
  const states = ['not_started','in_progress','done'];
  task.status = states[(states.indexOf(task.status)+1)%3];
  saveData();
  renderToday();
}

function toggleNotes(id) { document.getElementById(id).classList.toggle('show-notes'); }

// ==================== GANTT VIEW ====================
function renderGantt() {
  const el = document.getElementById('gantt-view');
  if (!data.courses.length) { el.innerHTML='<div class="empty-day"><div class="emoji">📊</div><p>Agrega un curso para ver el timeline</p></div>'; return; }

  // Determine date range
  let minDate = new Date(2026, 2, 1); // Mar 2026
  let maxDate = new Date(2026, 11, 31); // Dec 2026
  data.courses.forEach(c => {
    const s = parseD(c.startDate), e = parseD(c.endDate);
    if (s < minDate) minDate = new Date(s);
    if (e > maxDate) maxDate = new Date(e);
  });
  minDate.setDate(1); // Start of month
  maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth()+1, 0); // End of month

  const totalDays = diffDays(minDate, maxDate) + 1;
  let dayWidth;
  if (ganttZoom === 'week') dayWidth = 28;
  else if (ganttZoom === 'month') dayWidth = 10;
  else dayWidth = 3.5;
  const timelineWidth = totalDays * dayWidth;

  // Build months header
  let months = [];
  let d = new Date(minDate);
  while (d <= maxDate) {
    const mStart = new Date(d);
    const mEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const daysInRange = diffDays(mStart > minDate ? mStart : minDate, mEnd > maxDate ? maxDate : mEnd) + 1;
    months.push({ name: MONTHS_SHORT[d.getMonth()] + ' ' + d.getFullYear(), width: daysInRange * dayWidth });
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  function dateToX(dateStr) {
    return diffDays(minDate, parseD(dateStr)) * dayWidth;
  }

  let html = `
    <div class="gantt-controls">
      <div class="zoom-btns">
        <button class="zoom-btn ${ganttZoom==='week'?'active':''}" onclick="setZoom('week')">Semana</button>
        <button class="zoom-btn ${ganttZoom==='month'?'active':''}" onclick="setZoom('month')">Mes</button>
        <button class="zoom-btn ${ganttZoom==='quarter'?'active':''}" onclick="setZoom('quarter')">Trimestre</button>
      </div>
    </div>
    <div class="gantt-container" style="width:${200+timelineWidth}px">
      <div class="gantt-header">
        <div class="gantt-label-col">Curso</div>
        <div class="gantt-timeline" style="width:${timelineWidth}px">
          ${months.map(m => `<div class="gantt-month" style="width:${m.width}px">${m.name}</div>`).join('')}
        </div>
      </div>`;

  data.courses.forEach(c => {
    const sx = dateToX(c.startDate);
    const ex = dateToX(c.endDate);
    html += `<div class="gantt-row">
      <div class="gantt-row-label"><div class="course-dot" style="background:${c.color}"></div>${c.name}</div>
      <div class="gantt-row-timeline" style="width:${timelineWidth}px">`;

    // Phase bars
    c.phases.forEach((p,i) => {
      const px = dateToX(p.startDate);
      const pw = dateToX(p.endDate) - px + dayWidth;
      const opacity = .4 + (i * .15);
      html += `<div class="gantt-bar" style="left:${px}px;width:${pw}px;background:${c.color};opacity:${opacity}"
        onmouseenter="showTip(event,'${p.name}','${p.startDate} — ${p.endDate}','')" onmouseleave="hideTip()">
        <div class="gantt-bar-label">${pw > 60 ? p.name : ''}</div></div>`;
    });

    // Milestones
    c.milestones.forEach(m => {
      const mx = dateToX(m.date);
      html += `<div class="gantt-milestone" style="left:${mx}px;background:${c.color}"
        onmouseenter="showTip(event,'◆ ${m.name}','${m.date}','${m.time||''}')" onmouseleave="hideTip()"
        onclick="goToDate('${m.date}')"></div>`;
    });

    html += `</div></div>`;
  });

  // Today line
  const todayStr = iso(new Date());
  if (todayStr >= iso(minDate) && todayStr <= iso(maxDate)) {
    const tx = dateToX(todayStr) + 200;
    html += `<div class="gantt-today-line" style="left:${tx}px;top:0;height:100%">
      <div class="gantt-today-label">HOY</div></div>`;
  }

  html += `</div>`;
  el.innerHTML = html;

  // Scroll to today
  const todayX = dateToX(todayStr);
  if (todayX > 300) el.scrollLeft = todayX - 200;
}

function setZoom(z) { ganttZoom = z; renderGantt(); }
function goToDate(dateStr) { currentDate = parseD(dateStr); switchView('today'); }

function showTip(e, title, date, status) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<div class="tt-title">${title}</div><div class="tt-date">${date}</div>${status?`<div class="tt-status">${status}</div>`:''}`;
  tip.style.display = 'block';
  tip.style.left = (e.clientX+12)+'px';
  tip.style.top = (e.clientY+12)+'px';
}
function hideTip() { document.getElementById('tooltip').style.display='none'; }

// ==================== EDITOR ====================
let editorMode = 'list'; // list | course | phase | milestone | task
let editCourseId = null;
let editItemId = null;

function openEditor() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('editor').classList.add('open');
  editorMode = 'list';
  renderEditor();
}
function closeEditor() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('editor').classList.remove('open');
}

function renderEditor() {
  const el = document.getElementById('editor');
  if (editorMode === 'list') {
    el.innerHTML = `
      <h3>Gestionar cursos <button class="editor-close" onclick="closeEditor()">&times;</button></h3>
      ${data.courses.map(c => `
        <div class="course-card" onclick="editCourse('${c.id}')">
          <div class="course-card-header">
            <div class="course-dot" style="background:${c.color}"></div>
            <strong>${c.name}</strong>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-top:6px">${c.phases.length} fases · ${c.milestones.length} hitos · ${c.tasks.length} tareas</div>
        </div>
      `).join('')}
      <button class="add-btn" onclick="newCourse()">+ Nuevo curso</button>
      <div class="editor-actions" style="margin-top:24px">
        <button class="btn-secondary" onclick="exportJSON()">📥 Exportar JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📤 Importar JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
        <button class="btn-danger" onclick="resetData()">🔄 Reset datos semilla</button>
      </div>`;
  } else if (editorMode === 'course') {
    const c = editCourseId ? data.courses.find(x=>x.id===editCourseId) : null;
    el.innerHTML = `
      <h3>${c ? 'Editar' : 'Nuevo'} curso <button class="editor-close" onclick="editorMode='list';renderEditor()">&larr;</button></h3>
      <div class="form-group"><label>Nombre</label><input id="ed-name" value="${c?c.name:''}"></div>
      <div class="form-group"><label>Color</label>
        <div class="color-picker">${COLORS.map(cl => `<div class="color-swatch ${c&&c.color===cl?'selected':''}" style="background:${cl}" onclick="selectColor(this,'${cl}')"></div>`).join('')}</div>
      </div>
      <div class="form-group"><label>Fecha inicio</label><input type="date" id="ed-start" value="${c?c.startDate:''}"></div>
      <div class="form-group"><label>Fecha fin</label><input type="date" id="ed-end" value="${c?c.endDate:''}"></div>
      <button class="btn-primary" onclick="saveCourse()">${c?'Guardar':'Crear curso'}</button>
      ${c ? `
        <div class="sub-section"><h4>Fases <button class="add-btn" style="width:auto;padding:4px 12px;margin:0" onclick="newPhase()">+</button></h4>
          ${c.phases.map(p => `<div class="item-row"><span>${p.name}</span><span style="color:var(--text2);font-size:11px;margin-left:8px">${p.startDate} — ${p.endDate}</span><button class="del-btn" onclick="editPhase('${p.id}')">✎</button><button class="del-btn" onclick="delPhase('${p.id}')">×</button></div>`).join('')}
        </div>
        <div class="sub-section"><h4>Hitos <button class="add-btn" style="width:auto;padding:4px 12px;margin:0" onclick="newMilestone()">+</button></h4>
          ${c.milestones.map(m => `<div class="item-row"><span>◆ ${m.name}</span><span style="color:var(--text2);font-size:11px;margin-left:8px">${m.date}</span><button class="del-btn" onclick="editMilestone('${m.id}')">✎</button><button class="del-btn" onclick="delMilestone('${m.id}')">×</button></div>`).join('')}
        </div>
        <div class="sub-section"><h4>Tareas <button class="add-btn" style="width:auto;padding:4px 12px;margin:0" onclick="newTask()">+</button></h4>
          ${c.tasks.sort((a,b)=>a.date.localeCompare(b.date)).map(t => `<div class="item-row"><span>${t.name}</span><span style="color:var(--text2);font-size:11px;margin-left:8px">${t.date}</span><button class="del-btn" onclick="editTask('${t.id}')">✎</button><button class="del-btn" onclick="delTask('${t.id}')">×</button></div>`).join('')}
        </div>
        <div style="margin-top:20px"><button class="btn-danger" onclick="delCourse('${c.id}')">Eliminar curso</button></div>
      ` : ''}`;
  } else if (editorMode === 'phase') {
    const c = data.courses.find(x=>x.id===editCourseId);
    const p = editItemId ? c.phases.find(x=>x.id===editItemId) : null;
    el.innerHTML = `
      <h3>${p?'Editar':'Nueva'} fase <button class="editor-close" onclick="editorMode='course';renderEditor()">&larr;</button></h3>
      <div class="form-group"><label>Nombre</label><input id="ed-pname" value="${p?p.name:''}"></div>
      <div class="form-group"><label>Fecha inicio</label><input type="date" id="ed-pstart" value="${p?p.startDate:''}"></div>
      <div class="form-group"><label>Fecha fin</label><input type="date" id="ed-pend" value="${p?p.endDate:''}"></div>
      <button class="btn-primary" onclick="savePhase()">${p?'Guardar':'Crear fase'}</button>`;
  } else if (editorMode === 'milestone') {
    const c = data.courses.find(x=>x.id===editCourseId);
    const m = editItemId ? c.milestones.find(x=>x.id===editItemId) : null;
    el.innerHTML = `
      <h3>${m?'Editar':'Nuevo'} hito <button class="editor-close" onclick="editorMode='course';renderEditor()">&larr;</button></h3>
      <div class="form-group"><label>Nombre</label><input id="ed-mname" value="${m?m.name:''}"></div>
      <div class="form-group"><label>Fecha</label><input type="date" id="ed-mdate" value="${m?m.date:''}"></div>
      <div class="form-group"><label>Hora (opcional)</label><input id="ed-mtime" placeholder="18:00" value="${m?m.time||'':''}"></div>
      <button class="btn-primary" onclick="saveMilestone()">${m?'Guardar':'Crear hito'}</button>`;
  } else if (editorMode === 'task') {
    const c = data.courses.find(x=>x.id===editCourseId);
    const t = editItemId ? c.tasks.find(x=>x.id===editItemId) : null;
    el.innerHTML = `
      <h3>${t?'Editar':'Nueva'} tarea <button class="editor-close" onclick="editorMode='course';renderEditor()">&larr;</button></h3>
      <div class="form-group"><label>Nombre</label><input id="ed-tname" value="${t?t.name:''}"></div>
      <div class="form-group"><label>Fase</label>
        <select id="ed-tphase">${c.phases.map(p=>`<option value="${p.id}" ${t&&t.phaseId===p.id?'selected':''}>${p.name}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Fecha</label><input type="date" id="ed-tdate" value="${t?t.date:''}"></div>
      <div class="form-group"><label>Hora (opcional)</label><input id="ed-ttime" placeholder="10:00" value="${t?t.time||'':''}"></div>
      <div class="form-group"><label>Notas / Contenido</label><textarea id="ed-tnotes" rows="8" placeholder="Contenido, copy, instrucciones...">${t?t.notes||'':''}</textarea></div>
      <button class="btn-primary" onclick="saveTask()">${t?'Guardar':'Crear tarea'}</button>`;
  }
}

let selectedColor = null;
function selectColor(el, c) {
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = c;
}

// COURSE CRUD
function newCourse() { editCourseId=null; selectedColor=COLORS[0]; editorMode='course'; renderEditor(); }
function editCourse(id) { editCourseId=id; editorMode='course'; renderEditor(); }
function saveCourse() {
  const name = document.getElementById('ed-name').value.trim();
  const start = document.getElementById('ed-start').value;
  const end = document.getElementById('ed-end').value;
  if (!name||!start||!end) return alert('Completa todos los campos');
  const color = selectedColor || COLORS[0];
  if (editCourseId) {
    const c = data.courses.find(x=>x.id===editCourseId);
    c.name=name; c.color=color; c.startDate=start; c.endDate=end;
  } else {
    editCourseId = uid();
    data.courses.push({ id:editCourseId, name, color, startDate:start, endDate:end, phases:[], milestones:[], tasks:[] });
  }
  saveData(); renderEditor(); refresh();
}
function delCourse(id) { if(!confirm('Eliminar este curso y todas sus tareas?')) return; data.courses=data.courses.filter(c=>c.id!==id); saveData(); editorMode='list'; renderEditor(); refresh(); }

// PHASE CRUD
function newPhase() { editItemId=null; editorMode='phase'; renderEditor(); }
function editPhase(id) { editItemId=id; editorMode='phase'; renderEditor(); }
function savePhase() {
  const c = data.courses.find(x=>x.id===editCourseId);
  const name = document.getElementById('ed-pname').value.trim();
  const start = document.getElementById('ed-pstart').value;
  const end = document.getElementById('ed-pend').value;
  if (!name||!start||!end) return alert('Completa todos los campos');
  if (editItemId) { const p=c.phases.find(x=>x.id===editItemId); p.name=name; p.startDate=start; p.endDate=end; }
  else { c.phases.push({ id:uid(), name, startDate:start, endDate:end }); }
  saveData(); editorMode='course'; renderEditor(); refresh();
}
function delPhase(id) { const c=data.courses.find(x=>x.id===editCourseId); c.phases=c.phases.filter(p=>p.id!==id); saveData(); renderEditor(); refresh(); }

// MILESTONE CRUD
function newMilestone() { editItemId=null; editorMode='milestone'; renderEditor(); }
function editMilestone(id) { editItemId=id; editorMode='milestone'; renderEditor(); }
function saveMilestone() {
  const c = data.courses.find(x=>x.id===editCourseId);
  const name = document.getElementById('ed-mname').value.trim();
  const date = document.getElementById('ed-mdate').value;
  const time = document.getElementById('ed-mtime').value.trim()||null;
  if (!name||!date) return alert('Completa nombre y fecha');
  if (editItemId) { const m=c.milestones.find(x=>x.id===editItemId); m.name=name; m.date=date; m.time=time; }
  else { c.milestones.push({ id:uid(), name, date, time }); }
  saveData(); editorMode='course'; renderEditor(); refresh();
}
function delMilestone(id) { const c=data.courses.find(x=>x.id===editCourseId); c.milestones=c.milestones.filter(m=>m.id!==id); saveData(); renderEditor(); refresh(); }

// TASK CRUD
function newTask() { editItemId=null; editorMode='task'; renderEditor(); }
function editTask(id) { editItemId=id; editorMode='task'; renderEditor(); }
function saveTask() {
  const c = data.courses.find(x=>x.id===editCourseId);
  const name = document.getElementById('ed-tname').value.trim();
  const phaseId = document.getElementById('ed-tphase').value;
  const date = document.getElementById('ed-tdate').value;
  const time = document.getElementById('ed-ttime').value.trim()||null;
  const notes = document.getElementById('ed-tnotes').value.trim()||null;
  if (!name||!date) return alert('Completa nombre y fecha');
  if (editItemId) { const t=c.tasks.find(x=>x.id===editItemId); t.name=name; t.phaseId=phaseId; t.date=date; t.time=time; t.notes=notes; }
  else { c.tasks.push({ id:uid(), name, phaseId, date, time, status:'not_started', notes }); }
  saveData(); editorMode='course'; renderEditor(); refresh();
}
function delTask(id) { const c=data.courses.find(x=>x.id===editCourseId); c.tasks=c.tasks.filter(t=>t.id!==id); saveData(); renderEditor(); refresh(); }

// IMPORT/EXPORT
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'instituto-timeline-backup.json';
  a.click();
}
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      data = JSON.parse(ev.target.result);
      saveData();
      renderEditor();
      refresh();
      alert('Datos importados correctamente');
    } catch(err) { alert('Error al importar: archivo JSON invalido'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function resetData() {
  if (!confirm('Esto reemplazara todos los datos con los datos semilla originales. Continuar?')) return;
  data = JSON.parse(JSON.stringify(SEED_DATA));
  saveData();
  renderEditor();
  refresh();
}

function refresh() { if (currentView==='today') renderToday(); else renderGantt(); }

// ==================== INIT ====================
renderToday();
</script>
</body>
</html>
